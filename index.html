<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JustOSINT — OSINT Tools Directory</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<!-- ╔══════════════════════════════════════╗ -->
<!-- ║  TOP BAR                             ║ -->
<!-- ╚══════════════════════════════════════╝ -->
<header id="topbar">
  <div class="topbar-brand">
    <span class="brand-icon">⬡</span>
    <div class="brand-lockup">
      <span class="brand-name">JustOSINT</span>
      <span class="brand-credit">Built by Influence</span>
    </div>
  </div>
  <div class="topbar-search">
    <span class="search-icon">⌕</span>
    <input id="searchInput" type="text" placeholder="Search 1,150+ tools by name, description, or category…" autocomplete="off" spellcheck="false" />
    <button id="searchClear" class="search-clear" title="Clear search" aria-label="Clear search">✕</button>
  </div>
  <div class="topbar-actions">
    <button id="profilesToggleBtn" class="topbar-btn" title="Profile Builder">
      <span class="btn-icon">👤</span>
      <span class="btn-label">Profiles</span>
    </button>
    <button id="favToggleBtn" class="topbar-btn" title="Favorites">
      <span class="btn-icon">★</span>
      <span class="btn-label">Favorites</span>
    </button>
  </div>
</header>

<!-- ╔══════════════════════════════════════╗ -->
<!-- ║  APP BODY (sidebar + main)           ║ -->
<!-- ╚══════════════════════════════════════╝ -->
<div id="appBody">

  <!-- ── SIDEBAR ───────────────────────── -->
  <aside id="sidebar">
    <div class="sidebar-section-label">CATEGORIES</div>
    <nav id="catNav">
      <!-- Injected by JS -->
    </nav>
    <div class="sidebar-credit">
      <div class="sidebar-credit-label">Credits</div>
      <div class="sidebar-credit-line">Designed and built by Influence.</div>
    </div>
  </aside>

  <!-- ── MAIN CONTENT ──────────────────── -->
  <div id="mainWrap">

    <!-- Filter bar -->
    <div id="filterBar">
      <div id="reqFilters">
        <button class="req-filter active" data-req="all">All</button>
        <button class="req-filter" data-req="open">
          <span class="badge-dot open"></span>Open
        </button>
        <button class="req-filter" data-req="login">
          <span class="badge-dot login"></span>Login
        </button>
        <button class="req-filter" data-req="api">
          <span class="badge-dot api"></span>API Key
        </button>
        <button class="req-filter" data-req="paid">
          <span class="badge-dot paid"></span>Paid
        </button>
        <button class="req-filter" data-req="install">
          <span class="badge-dot install"></span>Install
        </button>
        <button class="req-filter" data-req="dork">
          <span class="badge-dot dork"></span>Dork
        </button>
      </div>
      <div id="facetFilters">
        <button class="facet-filter active" data-facet="all">Any Source</button>
        <button class="facet-filter" data-facet="people">People</button>
        <button class="facet-filter" data-facet="infra">Infra</button>
        <button class="facet-filter" data-facet="media">Media</button>
        <button class="facet-filter" data-facet="government">Government</button>
        <button class="facet-filter" data-facet="dataset">Datasets</button>
        <button class="facet-filter" data-facet="repo">Repo Tools</button>
      </div>
      <div id="regionFilters">
        <button class="region-filter active" data-region="all">Any Region</button>
        <button class="region-filter" data-region="global">Global</button>
        <button class="region-filter" data-region="us">US</button>
        <button class="region-filter" data-region="uk">UK</button>
        <button class="region-filter" data-region="eu">EU</button>
        <button class="region-filter" data-region="ca">CA</button>
        <button class="region-filter" data-region="in">IN</button>
        <button class="region-filter" data-region="de">DE</button>
        <button class="region-filter" data-region="nl">NL</button>
        <button class="region-filter" data-region="au">AU</button>
        <button class="region-filter" data-region="regional">Regional</button>
      </div>
      <div id="safetyFilters">
        <button class="safety-filter active" data-safety="all">Any Safety</button>
        <button class="safety-filter" data-safety="screened">Screened</button>
        <button class="safety-filter" data-safety="caution">Caution</button>
      </div>
      <div id="resultMeta"></div>
    </div>

    <!-- Tool grid -->
    <div id="toolGrid">
      <!-- Injected by JS -->
    </div>

    <!-- Empty state -->
    <div id="emptyState" class="hidden">
      <div class="empty-icon">🔍</div>
      <div class="empty-title">No tools found</div>
      <div class="empty-sub">Try a different search term or clear the filters.</div>
    </div>

  </div><!-- /mainWrap -->

</div><!-- /appBody -->

<!-- ╔══════════════════════════════════════╗ -->
<!-- ║  PROFILE SIDE PANEL                  ║ -->
<!-- ╚══════════════════════════════════════╝ -->
<div id="profilePanel" class="side-panel hidden">
  <div class="panel-header">
    <span class="panel-title">Profile Builder</span>
    <button class="panel-close" id="profilePanelClose">✕</button>
  </div>
  <div class="panel-body">

    <!-- Profile list -->
    <div id="profileListSection">
      <div class="panel-section-head">
        <span>Saved Profiles</span>
        <button id="newProfileBtn" class="small-btn">+ New</button>
      </div>
      <div id="profileList"></div>
      <div class="panel-section-head" style="margin-top:16px;">
        <span>Import / Export</span>
      </div>
      <div class="row-gap">
        <button id="exportProfilesBtn" class="small-btn">⬇ Export JSON</button>
        <label class="small-btn" style="cursor:pointer;">
          ⬆ Import JSON
          <input type="file" id="importProfilesInput" accept=".json" style="display:none;" />
        </label>
      </div>
    </div>

    <!-- Profile form -->
    <div id="profileFormSection" class="hidden">
      <div class="panel-section-head">
        <span id="profileFormTitle">New Profile</span>
        <button id="backToListBtn" class="small-btn">← Back</button>
      </div>
      <form id="profileForm" autocomplete="off">
        <div class="field-group">
          <label>Full Name</label>
          <input type="text" id="pf_fullName" placeholder="John Doe" />
        </div>
        <div class="field-group">
          <label>Alias / Handle</label>
          <input type="text" id="pf_alias" placeholder="@username" />
        </div>
        <div class="field-group">
          <label>Date of Birth</label>
          <input type="text" id="pf_dob" placeholder="YYYY-MM-DD" />
        </div>
        <div class="field-group">
          <label>Location</label>
          <input type="text" id="pf_location" placeholder="City, Country" />
        </div>
        <div class="field-group">
          <label>Email Addresses</label>
          <textarea id="pf_emails" rows="2" placeholder="one per line"></textarea>
        </div>
        <div class="field-group">
          <label>Phone Numbers</label>
          <textarea id="pf_phones" rows="2" placeholder="one per line"></textarea>
        </div>
        <div class="field-group">
          <label>Usernames</label>
          <textarea id="pf_usernames" rows="2" placeholder="one per line"></textarea>
        </div>
        <div class="field-group">
          <label>Employers / Organizations</label>
          <textarea id="pf_employers" rows="2" placeholder="one per line"></textarea>
        </div>
        <div class="field-group">
          <label>Relationship to Subject</label>
          <input type="text" id="pf_relationship" placeholder="Target / Associate / POI…" />
        </div>
        <div class="field-group">
          <label>Risk Level</label>
          <select id="pf_risk">
            <option value="">— Select —</option>
            <option>Low</option>
            <option>Medium</option>
            <option>High</option>
            <option>Critical</option>
          </select>
        </div>
        <div class="field-group">
          <label>Tags</label>
          <input type="text" id="pf_tags" placeholder="fraud, social-eng, …" />
        </div>
        <div class="field-group">
          <label>Notes</label>
          <textarea id="pf_notes" rows="4" placeholder="Investigation notes…"></textarea>
        </div>
        <div class="form-actions">
          <button type="button" id="saveProfileBtn" class="btn-primary">Save Profile</button>
          <button type="button" id="cancelProfileBtn" class="small-btn">Cancel</button>
        </div>
      </form>
    </div>

  </div><!-- /panel-body -->
</div>

<!-- ╔══════════════════════════════════════╗ -->
<!-- ║  FAVORITES SIDE PANEL                ║ -->
<!-- ╚══════════════════════════════════════╝ -->
<div id="favPanel" class="side-panel hidden">
  <div class="panel-header">
    <span class="panel-title">★ Favorites</span>
    <button class="panel-close" id="favPanelClose">✕</button>
  </div>
  <div class="panel-body">
    <div id="favList">
      <div class="empty-fav">No favorites yet. Click the star on any tool to pin it here.</div>
    </div>
  </div>
</div>

<!-- Overlay for panels -->
<div id="overlay" class="hidden"></div>

<script src="script.js"></script>
</body>
</html>
